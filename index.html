<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Eida's social links" />
    <title>Eida | Links</title>

    <!-- Font Awesome (social icons) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="container">
      <section class="card" aria-label="Social links">
        <!-- Option A: Use an image (recommended). Put your file at assets/avatar.jpg -->
        <img
          class="avatar"
          src="assets/avatar.png"
          alt="Profile photo of Eida"
          loading="lazy"
          onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='grid';"
        />

        <!-- Option B: Fallback avatar if the image is missing -->
        <div id="avatarFallback" class="avatar-fallback" aria-hidden="true" style="display:none;">
          E
        </div>

        <h1 class="name">Eida</h1>
        <p class="tagline">Find me on my socials 👇</p>

        <nav class="links" aria-label="Social media links">
          <a class="link-btn facebook" href="https://www.facebook.com/profile.php?id=61563386399047">
            <i class="fa-brands fa-facebook" aria-hidden="true"></i>
            <span>Facebook</span>
          </a>

          <a class="link-btn instagram" href="https://www.instagram.com/eida_1010?igsh=MXhnbHB5YjNtN3Vrag==">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            <span>Instagram</span>
          </a>

          <a class="link-btn tiktok" href="https://www.tiktok.com/@alone4ever802?is_from_webapp=1&sender_device=pc">
            <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
            <span>TikTok</span>
          </a>

          <a class="link-btn youtube" href="https://youtube.com/@eida1018?si=jUbFT9rss-aMoZhK">
            <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            <span>YouTube</span>
          </a>
        </nav>

        <div class="actions">
          <button id="copyBtn" class="secondary-btn" type="button">
            <i class="fa-regular fa-copy" aria-hidden="true"></i>
            <span>Copy this page link</span>
          </button>
        </div>

        <footer class="footer">
          <small>© <span id="year"></span> Eida</small>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
